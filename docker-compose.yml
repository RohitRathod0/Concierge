version: '3.8'

services:
  frontend:
    build: 
      context: ./frontend
    ports: 
      - "3000:3000"
    environment: 
      - VITE_API_BASE_URL=http://127.0.0.1:8000
    volumes: 
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend

  backend:
    build: 
      context: ./backend
    ports: 
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://et_user:et_password@db:5432/et_concierge
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-default_secret_key_needs_replacement_in_prod}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Phase 2 additions
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8001
      - USE_AGENT_ORCHESTRATION=${USE_AGENT_ORCHESTRATION:-false}
      - USE_RAG_NAVIGATION=${USE_RAG_NAVIGATION:-false}
      - ENABLE_JOURNEY_SYSTEM=${ENABLE_JOURNEY_SYSTEM:-true}
    volumes: 
      - ./backend:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    mem_limit: 2g
    depends_on: 
      db:
        condition: service_healthy
      redis:
        condition: service_started
      chroma:
        condition: service_started

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: et_user
      POSTGRES_PASSWORD: et_password
      POSTGRES_DB: et_concierge
    ports: 
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/1_init.sql
      - ./database/seed_products.sql:/docker-entrypoint-initdb.d/2_seed.sql
      - ./database/phase2_migration.sql:/docker-entrypoint-initdb.d/3_phase2.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U et_user -d et_concierge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: 
      - "6379:6379"
    volumes: 
      - redis_data:/data

  # Phase 2: Chroma vector database
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8001"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8001

  # Phase 2: Prometheus metrics (start with: docker compose --profile monitoring up)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    profiles:
      - monitoring

  # Phase 2: Grafana dashboards
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  grafana_data:
